<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Post-Visit Log | Vitality Core</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed": "#67fcc6",
                        "on-tertiary-fixed": "#191c1d",
                        "surface-variant": "#e1e3e4",
                        "surface-container": "#edeeef",
                        "outline": "#717786",
                        "on-background": "#191c1d",
                        "surface-bright": "#f8f9fa",
                        "on-secondary-fixed-variant": "#00513a",
                        "on-tertiary-container": "#fcfdfe",
                        "inverse-primary": "#b1c5ff",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#00419e",
                        "error": "#ba1a1a",
                        "secondary": "#006c4f",
                        "on-primary-container": "#fefcff",
                        "surface-container-high": "#e7e8e9",
                        "surface": "#f8f9fa",
                        "on-secondary": "#ffffff",
                        "on-surface": "#191c1d",
                        "background": "#f8f9fa",
                        "on-error": "#ffffff",
                        "secondary-container": "#67fcc6",
                        "primary-container": "#036cfb",
                        "inverse-surface": "#2e3132",
                        "outline-variant": "#c1c6d7",
                        "on-secondary-container": "#007354",
                        "surface-container-low": "#f3f4f5",
                        "secondary-fixed-dim": "#44dfab",
                        "primary-fixed": "#dae2ff",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#414754",
                        "tertiary": "#5a5c5d",
                        "on-secondary-fixed": "#002116",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#737576",
                        "surface-tint": "#0057ce",
                        "on-primary": "#ffffff",
                        "primary": "#0055c9",
                        "surface-container-highest": "#e1e3e4",
                        "surface-dim": "#d9dadb",
                        "primary-fixed-dim": "#b1c5ff",
                        "on-primary-fixed": "#001946",
                        "tertiary-fixed": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#454748",
                        "inverse-on-surface": "#f0f1f2"

                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-overlay {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e1e3e4;
            border-radius: 10px;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
    <!-- Mock Background Content (Simulating Records View) -->

    <!-- Modal Backdrop -->
    <div class="fixed inset-0 z-[60] glass-overlay flex items-end md:items-center justify-center">
        <!-- Modal Container -->
        <div
            class="w-full max-w-2xl bg-surface-container-lowest shadow-[0_20px_40px_rgba(25,28,29,0.1)] rounded-t-xl md:rounded-lg overflow-hidden flex flex-col max-h-[813px]">
            <!-- Header -->
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex flex-col">
                    <h1 class="font-headline font-extrabold text-xl tracking-tight text-on-surface">Dr. w'12'</h1>
                    <p class="font-body text-sm text-on-surface-variant">3/31/2026 at 13:02</p>
                </div>
                <button
                    class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-on-surface-variant">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <!-- Scrollable Content -->
            <div class="px-6 pb-6 overflow-y-auto custom-scrollbar space-y-8">
                <!-- Visit Info Section -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 rounded-lg bg-surface-container-low">
                        <span
                            class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block mb-1">LOCATION</span>
                        <p class="font-body font-semibold text-on-surface">awda</p>
                    </div>
                    <div class="p-4 rounded-lg bg-surface-container-low">
                        <span
                            class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block mb-1">REASON</span>
                        <p class="font-body font-semibold text-on-surface">Not specified</p>
                    </div>
                </div>
                <!-- Post-Visit Log Section -->
                <div class="space-y-3">
                    <label
                        class="font-label text-[11px] font-bold uppercase tracking-widest text-primary flex items-center gap-2">
                        POST-VISIT LOG
                        <span class="h-px flex-1 bg-outline-variant opacity-30"></span>
                    </label>
                    <div class="relative group">
                        <textarea
                            class="w-full min-h-[280px] p-5 bg-surface-container-low border-0 rounded-lg focus:ring-0 text-on-surface placeholder:text-outline/60 font-body leading-relaxed resize-none transition-all"
                            placeholder="Log the doctor's notes, recommendations, or new prescriptions here after your visit..."></textarea>
                        <div class="absolute bottom-4 right-4 text-outline/40 text-xs font-medium">Auto-saving...</div>
                    </div>
                </div>
                <!-- Attached Media (Placeholder for Visual Depth) -->
                <div class="space-y-3">
                    <label
                        class="font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant">ATTACHED
                        PHOTOS</label>
                    <div class="flex gap-3 overflow-x-auto pb-2">
                        <div
                            class="w-24 h-24 rounded-lg bg-surface-container-high flex-shrink-0 flex items-center justify-center border-2 border-dashed border-outline-variant">
                            <span class="material-symbols-outlined text-outline">add_a_photo</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Action Footer -->
            <div
                class="p-6 bg-surface-container-low/50 backdrop-blur-md flex flex-col gap-4 border-t border-surface-container-high">
                <div class="flex items-center justify-between w-full">
                    <!-- Left Actions -->
                    <div class="flex items-center gap-2">
                        <button
                            class="w-11 h-11 flex items-center justify-center rounded-full text-error hover:bg-error-container/20 transition-all active:scale-95"
                            title="Delete">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                        <button
                            class="w-11 h-11 flex items-center justify-center rounded-full text-primary hover:bg-primary-fixed/30 transition-all active:scale-95"
                            title="Export to Calendar">
                            <span class="material-symbols-outlined">calendar_add_on</span>
                        </button>
                    </div>
                    <!-- Right Buttons -->
                    <div class="flex items-center gap-3">
                        <button
                            class="px-6 h-11 font-label font-semibold text-on-surface-variant hover:text-on-surface transition-colors active:scale-95">
                            Close
                        </button>
                        <button
                            class="px-8 h-12 bg-primary text-on-primary font-headline font-bold rounded-full shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-95 transition-all">
                            Save Notes
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Top App Bar (Consistent Shell) -->
    <header
        class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 shadow-[0_20px_40px_rgba(25,28,29,0.06)]">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container">
                <img alt="Profile" class="w-full h-full object-cover"
                    data-alt="professional male profile photo with warm lighting and soft blurred office background"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9G93C8n3lqg8V5ZUltL1RrEc8-6X__oDij33Vl81Af6GhWQwUHYjQWpbnXE6ZUbXnFj0GX4U6aypvP9QXrMTTvQA1AI48VWeXoMxJfjLti-H2vsiM6R8gjvluowaxdYFYY62zFaubatWfS9l5VnQ8Iv9OPQO4-nARsKvKQPHbCGOHDVX43GBklX4eCGvBjzBhjsrCSvX1Nk1Cn2orJtpNo0FZxmQFWf5i4ESdMaq_pFHBCDrmEiyVp4ui87YVkw9wUwz3BCTOPf4" />
            </div>
            <span class="text-xl font-extrabold text-blue-700 tracking-tight">Vitality Core</span>
        </div>
        <div class="flex items-center gap-4">
            <button class="p-2 text-slate-500 hover:bg-slate-100/50 rounded-full transition-colors">
                <span class="material-symbols-outlined">notifications</span>
            </button>
        </div>
    </header>
    <!-- Bottom Navigation Bar (Consistent Shell) -->
    <nav
        class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-xl z-50 shadow-[0_-10px_40px_rgba(25,28,29,0.04)] rounded-t-[2rem]">
        <!-- Records (ACTIVE) -->
        <a class="flex flex-col items-center justify-center bg-blue-50 text-blue-700 rounded-full px-4 py-1.5 transition-all active:scale-90"
            href="#">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">description</span>
            <span class="font-inter text-[11px] font-semibold uppercase tracking-wider mt-0.5">Records</span>
        </a>
        <!-- Doctors -->
        <a class="flex flex-col items-center justify-center text-slate-400 px-4 py-1.5 hover:text-blue-500 transition-all"
            href="#">
            <span class="material-symbols-outlined">medical_services</span>
            <span class="font-inter text-[11px] font-semibold uppercase tracking-wider mt-0.5">Doctors</span>
        </a>
        <!-- Analytics -->
        <a class="flex flex-col items-center justify-center text-slate-400 px-4 py-1.5 hover:text-blue-500 transition-all"
            href="#">
            <span class="material-symbols-outlined">leaderboard</span>
            <span class="font-inter text-[11px] font-semibold uppercase tracking-wider mt-0.5">Analytics</span>
        </a>
        <!-- Reports -->
        <a class="flex flex-col items-center justify-center text-slate-400 px-4 py-1.5 hover:text-blue-500 transition-all"
            href="#">
            <span class="material-symbols-outlined">assignment</span>
            <span class="font-inter text-[11px] font-semibold uppercase tracking-wider mt-0.5">Reports</span>
        </a>
        <!-- Calendar -->
        <a class="flex flex-col items-center justify-center text-slate-400 px-4 py-1.5 hover:text-blue-500 transition-all"
            href="#">
            <span class="material-symbols-outlined">calendar_month</span>
            <span class="font-inter text-[11px] font-semibold uppercase tracking-wider mt-0.5">Calendar</span>
        </a>
    </nav>
</body>

</html>
