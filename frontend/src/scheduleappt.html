<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Schedule Appointment | MedVault</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-background": "#191c1d",
                        "inverse-surface": "#2e3132",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#414754",
                        "on-secondary-fixed-variant": "#00513a",
                        "surface-variant": "#e1e3e4",
                        "primary": "#0055c9",
                        "on-tertiary-fixed": "#191c1d",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#454748",
                        "on-primary-fixed": "#001946",
                        "surface": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "surface-bright": "#f8f9fa",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f3f4f5",
                        "on-secondary-container": "#007354",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "tertiary": "#5a5c5d",
                        "tertiary-container": "#737576",
                        "primary-fixed-dim": "#b1c5ff",
                        "surface-tint": "#0057ce",
                        "secondary-fixed": "#67fcc6",
                        "on-primary-fixed-variant": "#00419e",
                        "secondary-container": "#67fcc6",
                        "inverse-primary": "#b1c5ff",
                        "tertiary-fixed": "#e1e3e4",
                        "background": "#f8f9fa",
                        "surface-container": "#edeeef",
                        "primary-container": "#036cfb",
                        "primary-fixed": "#dae2ff",
                        "on-tertiary-container": "#fcfdfe",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#717786",
                        "surface-dim": "#d9dadb",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-high": "#e7e8e9",
                        "secondary-fixed-dim": "#44dfab",
                        "secondary": "#006c4f",
                        "on-secondary-fixed": "#002116",
                        "outline-variant": "#c1c6d7",
                        "on-primary-container": "#fefcff",
                        "on-secondary": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background font-body text-on-surface min-h-screen pb-32">
    <!-- TopAppBar -->

    <main class="pt-24 px-4 max-w-md mx-auto">
        <!-- Hero Decorative Element -->
        <div class="mb-8">
            <h2 class="font-headline font-extrabold text-3xl text-on-surface tracking-tight mb-2">Schedule Appointment
            </h2>
            <p class="text-on-surface-variant text-sm">Fill in the details below to secure your next medical
                consultation.</p>
        </div>
        <!-- Appointment Form -->
        <div class="space-y-4">
            <!-- Doctor & Clinic Info -->
            <div class="glass-card p-6 rounded-lg shadow-sm">
                <div class="space-y-5">
                    <div class="group">
                        <label
                            class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Doctor
                            Name</label>
                        <div class="relative">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary"
                                data-icon="person">person</span>
                            <input
                                class="w-full pl-12 pr-4 py-4 bg-surface-container-highest rounded-xl border-none focus:ring-2 focus:ring-primary transition-all font-medium text-on-surface placeholder:text-outline"
                                placeholder="e.g. Dr. Sarah Johnson" type="text" />
                        </div>
                    </div>
                    <div class="group">
                        <label
                            class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Location
                            / Clinic</label>
                        <div class="relative">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary"
                                data-icon="location_on">location_on</span>
                            <input
                                class="w-full pl-12 pr-4 py-4 bg-surface-container-highest rounded-xl border-none focus:ring-2 focus:ring-primary transition-all font-medium text-on-surface placeholder:text-outline"
                                placeholder="City Medical Center" type="text" />
                        </div>
                    </div>
                </div>
            </div>
            <!-- Date & Time Row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-4 rounded-lg shadow-sm">
                    <label
                        class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Date</label>
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-xl"
                            data-icon="calendar_today">calendar_today</span>
                        <input class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm font-semibold"
                            placeholder="Oct 24, 2023" type="text" />
                    </div>
                </div>
                <div class="glass-card p-4 rounded-lg shadow-sm">
                    <label
                        class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Time</label>
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-xl"
                            data-icon="schedule">schedule</span>
                        <input class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm font-semibold"
                            placeholder="10:30 AM" type="text" />
                    </div>
                </div>
            </div>
            <!-- Reason & Reminder -->
            <div class="glass-card p-6 rounded-lg shadow-sm space-y-5">
                <div>
                    <label
                        class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Reason
                        for visit</label>
                    <textarea
                        class="w-full px-4 py-3 bg-surface-container-highest rounded-xl border-none focus:ring-2 focus:ring-primary transition-all font-medium text-on-surface placeholder:text-outline resize-none"
                        placeholder="e.g. Annual checkup..." rows="3"></textarea>
                </div>
                <div>
                    <label
                        class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Reminder</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary"
                            data-icon="notifications_active">notifications_active</span>
                        <select
                            class="w-full pl-12 pr-10 py-4 bg-surface-container-highest rounded-xl border-none focus:ring-2 focus:ring-primary appearance-none transition-all font-medium text-on-surface">
                            <option>30 minutes before</option>
                            <option>1 hour before</option>
                            <option>1 day before</option>
                        </select>
                        <span
                            class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined pointer-events-none"
                            data-icon="expand_more">expand_more</span>
                    </div>
                </div>
            </div>
            <!-- Checklist Section -->
            <div class="glass-card p-6 rounded-lg shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-headline font-bold text-lg">Pre-visit Checklist</h3>
                    <button
                        class="text-primary text-xs font-bold flex items-center gap-1 hover:opacity-80 transition-opacity">
                        <span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                        Add Question
                    </button>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center gap-3 bg-surface-container-low p-4 rounded-xl">
                        <span class="text-xs font-bold text-outline">Q1</span>
                        <input class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm font-medium"
                            placeholder="Any specific symptoms?" type="text" />
                        <span
                            class="material-symbols-outlined text-outline cursor-pointer hover:text-error transition-colors"
                            data-icon="close">close</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- Action Buttons -->
        <div class="mt-8 flex flex-col gap-3">
            <button
                class="w-full py-4 bg-primary text-on-primary font-bold rounded-xl shadow-lg shadow-blue-500/30 active:scale-95 transition-all">
                Save Appointment
            </button>
            <button
                class="w-full py-4 bg-surface-container text-on-surface-variant font-bold rounded-xl hover:bg-surface-container-high transition-colors">
                Cancel
            </button>
        </div>
    </main>
    <!-- BottomNavBar -->

    </div>
</body>

</html>
