<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MedVault | Appointment Tracker</title>
    <!-- Google Fonts: Manrope & Inter -->
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols Outlined -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed-variant": "#00513a",
                        "surface-dim": "#d9dadb",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f8f9fa",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "tertiary-container": "#737576",
                        "surface-tint": "#0057ce",
                        "on-secondary-container": "#007354",
                        "on-primary-fixed": "#001946",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "outline-variant": "#c1c6d7",
                        "on-tertiary-fixed-variant": "#454748",
                        "surface-container-highest": "#e1e3e4",
                        "outline": "#717786",
                        "on-primary-fixed-variant": "#00419e",
                        "surface-container-low": "#f3f4f5",
                        "secondary-fixed-dim": "#44dfab",
                        "on-secondary-fixed": "#002116",
                        "surface-container": "#edeeef",
                        "secondary-container": "#67fcc6",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#dae2ff",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#414754",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#e1e3e4",
                        "on-tertiary-fixed": "#191c1d",
                        "surface-variant": "#e1e3e4",
                        "secondary": "#006c4f",
                        "inverse-primary": "#b1c5ff",
                        "surface": "#f8f9fa",
                        "primary-container": "#036cfb",
                        "on-surface": "#191c1d",
                        "inverse-surface": "#2e3132",
                        "secondary-fixed": "#67fcc6",
                        "primary": "#0055c9",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-background": "#191c1d",
                        "on-tertiary-container": "#fcfdfe",
                        "on-primary-container": "#fefcff",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#b1c5ff",
                        "background": "#f8f9fa",
                        "tertiary": "#5a5c5d"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-manrope {
            font-family: 'Manrope', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-surface min-h-screen pb-32">

    <main class="pt-24 px-6 max-w-[390px] mx-auto">
        <!-- Main Header -->
        <section class="mb-8">
            <h1 class="font-manrope font-extrabold text-3xl text-on-surface tracking-tight leading-tight">Appointment
                Tracker</h1>
            <p class="font-body text-on-surface-variant text-sm mt-1">Manage your upcoming doctor visits and checklists
            </p>
        </section>
        <!-- Monthly Calendar View -->
        <section class="glass-card rounded-lg p-5 mb-8 shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-manrope font-bold text-lg text-on-surface">March 2026</h2>
                <div class="flex items-center gap-1 bg-surface-container-low rounded-full p-1">
                    <button class="p-1 hover:bg-surface-container rounded-full transition-colors">
                        <span class="material-symbols-outlined text-sm" data-icon="chevron_left">chevron_left</span>
                    </button>
                    <button
                        class="px-3 py-0.5 text-[10px] font-bold uppercase tracking-wider text-primary">Today</button>
                    <button class="p-1 hover:bg-surface-container rounded-full transition-colors">
                        <span class="material-symbols-outlined text-sm" data-icon="chevron_right">chevron_right</span>
                    </button>
                </div>
            </div>
            <div class="grid grid-cols-7 gap-y-4 text-center">
                <!-- Day Labels -->
                <span class="text-[10px] font-bold text-outline uppercase tracking-widest">S</span>
                <span class="text-[10px] font-bold text-outline uppercase tracking-widest">M</span>
                <span class="text-[10px] font-bold text-outline uppercase tracking-widest">T</span>
                <span class="text-[10px] font-bold text-outline uppercase tracking-widest">W</span>
                <span class="text-[10px] font-bold text-outline uppercase tracking-widest">T</span>
                <span class="text-[10px] font-bold text-outline uppercase tracking-widest">F</span>
                <span class="text-[10px] font-bold text-outline uppercase tracking-widest">S</span>
                <!-- Calendar Grid (Simplified March 2026 Start Sun) -->
                <!-- First Row -->
                <button class="py-2 text-sm font-medium text-on-surface">1</button>
                <button class="py-2 text-sm font-medium text-on-surface">2</button>
                <button class="py-2 text-sm font-medium text-on-surface">3</button>
                <button class="py-2 text-sm font-medium text-on-surface">4</button>
                <button class="py-2 text-sm font-medium text-on-surface">5</button>
                <button class="py-2 text-sm font-medium text-on-surface">6</button>
                <button class="py-2 text-sm font-medium text-on-surface">7</button>
                <!-- ... middle rows (skipped for brevity/visual impact) ... -->
                <button class="py-2 text-sm font-medium text-on-surface">...</button>
                <button class="py-2 text-sm font-medium text-on-surface">...</button>
                <button class="py-2 text-sm font-medium text-on-surface">...</button>
                <button class="py-2 text-sm font-medium text-on-surface">...</button>
                <button class="py-2 text-sm font-medium text-on-surface">...</button>
                <button class="py-2 text-sm font-medium text-on-surface">20</button>
                <button class="py-2 text-sm font-medium text-on-surface">21</button>
                <button class="py-2 text-sm font-medium text-on-surface">22</button>
                <button class="py-2 text-sm font-medium text-on-surface">23</button>
                <button class="py-2 text-sm font-medium text-on-surface">24</button>
                <button class="py-2 text-sm font-medium text-on-surface">25</button>
                <button class="py-2 text-sm font-medium text-on-surface">26</button>
                <!-- Highlighted Date 27 -->
                <div class="relative py-2">
                    <button
                        class="w-8 h-8 mx-auto flex items-center justify-center bg-primary text-on-primary rounded-full text-sm font-bold shadow-md">27</button>
                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"></div>
                </div>
                <!-- Highlighted Date 28 -->
                <div class="relative py-2">
                    <button
                        class="w-8 h-8 mx-auto flex items-center justify-center border-2 border-primary text-primary rounded-full text-sm font-bold">28</button>
                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"></div>
                </div>
                <button class="py-2 text-sm font-medium text-on-surface">29</button>
                <button class="py-2 text-sm font-medium text-on-surface">30</button>
                <button class="py-2 text-sm font-medium text-on-surface">31</button>
            </div>
        </section>
        <!-- Upcoming Appointments -->
        <section class="space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="font-manrope font-bold text-lg text-on-surface">Upcoming Appointments</h3>
                <span class="text-xs font-semibold text-primary px-3 py-1 bg-primary-fixed rounded-full">2
                    Pending</span>
            </div>
            <!-- Card 1: Mar 27 -->
            <div
                class="glass-card rounded-lg p-5 flex flex-col gap-4 relative overflow-hidden group hover:bg-white transition-colors">
                <div class="flex justify-between items-start">
                    <div class="flex gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-primary-fixed flex flex-col items-center justify-center">
                            <span class="text-[10px] font-bold uppercase text-primary leading-none">Mar</span>
                            <span class="text-xl font-extrabold text-primary leading-none">27</span>
                        </div>
                        <div>
                            <h4 class="font-manrope font-bold text-on-surface">Dr. Dr. Self</h4>
                            <p class="text-xs text-on-surface-variant flex items-center gap-1 mt-0.5">
                                <span class="material-symbols-outlined text-[14px]" data-icon="schedule">schedule</span>
                                09:00 AM
                            </p>
                        </div>
                    </div>
                    <span
                        class="text-[10px] font-bold uppercase tracking-wider text-secondary px-2 py-0.5 bg-secondary-container rounded-md">Paid</span>
                </div>
                <div class="flex gap-2">
                    <button
                        class="flex-1 bg-surface-container-high py-2 rounded-full text-xs font-bold text-on-surface-variant hover:bg-surface-container-highest transition-colors">Reschedule</button>
                    <button
                        class="flex-1 bg-primary py-2 rounded-full text-xs font-bold text-on-primary shadow-sm active:scale-95 transition-transform">Details</button>
                </div>
            </div>
            <!-- Card 2: Mar 28 -->
            <div
                class="glass-card rounded-lg p-5 flex flex-col gap-4 relative overflow-hidden group hover:bg-white transition-colors">
                <div class="flex justify-between items-start">
                    <div class="flex gap-4">
                        <div
                            class="w-12 h-12 rounded-2xl bg-surface-container flex flex-col items-center justify-center">
                            <span class="text-[10px] font-bold uppercase text-outline leading-none">Mar</span>
                            <span class="text-xl font-extrabold text-on-surface leading-none">28</span>
                        </div>
                        <div>
                            <h4 class="font-manrope font-bold text-on-surface">Dr. Dr. Self</h4>
                            <p class="text-xs text-on-surface-variant flex items-center gap-1 mt-0.5">
                                <span class="material-symbols-outlined text-[14px]" data-icon="schedule">schedule</span>
                                09:00 AM
                            </p>
                        </div>
                    </div>
                    <span
                        class="text-[10px] font-bold uppercase tracking-wider text-secondary px-2 py-0.5 bg-secondary-container rounded-md">Paid</span>
                </div>
                <div class="flex gap-2">
                    <button
                        class="flex-1 bg-surface-container-high py-2 rounded-full text-xs font-bold text-on-surface-variant hover:bg-surface-container-highest transition-colors">Reschedule</button>
                    <button
                        class="flex-1 bg-primary py-2 rounded-full text-xs font-bold text-on-primary shadow-sm active:scale-95 transition-transform">Details</button>
                </div>
            </div>
        </section>
    </main>
    <!-- FAB -->
    <button
        class="fixed bottom-24 right-6 w-14 h-14 bg-primary text-on-primary rounded-2xl shadow-xl flex items-center justify-center z-40 active:scale-90 transition-transform">
        <span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
    </button>
    <!-- BottomNavBar -->

</body>

</html>
