<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Add Medical Report - MedVault</title>
    <!-- Google Fonts: Manrope & Inter -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols Outlined -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#e1e3e4",
                        "surface": "#f8f9fa",
                        "on-tertiary-fixed": "#191c1d",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d9dadb",
                        "on-tertiary-fixed-variant": "#454748",
                        "surface-tint": "#0057ce",
                        "primary-container": "#036cfb",
                        "inverse-primary": "#b1c5ff",
                        "surface-variant": "#e1e3e4",
                        "on-secondary-container": "#007354",
                        "on-primary-fixed-variant": "#00419e",
                        "primary-fixed": "#dae2ff",
                        "on-error-container": "#93000a",
                        "secondary-container": "#67fcc6",
                        "secondary-fixed-dim": "#44dfab",
                        "on-background": "#191c1d",
                        "on-tertiary-container": "#fcfdfe",
                        "tertiary-container": "#737576",
                        "primary": "#0055c9",
                        "on-primary-container": "#fefcff",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#001946",
                        "primary-fixed-dim": "#b1c5ff",
                        "on-secondary-fixed-variant": "#00513a",
                        "on-surface-variant": "#414754",
                        "on-surface": "#191c1d",
                        "secondary-fixed": "#67fcc6",
                        "outline-variant": "#c1c6d7",
                        "outline": "#717786",
                        "tertiary-fixed": "#e1e3e4",
                        "inverse-surface": "#2e3132",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "surface-container-high": "#e7e8e9",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f3f4f5",
                        "tertiary": "#5a5c5d",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-bright": "#f8f9fa",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f8f9fa",
                        "secondary": "#006c4f",
                        "on-secondary-fixed": "#002116",
                        "surface-container": "#edeeef"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Manrope', sans-serif;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-surface min-h-screen pb-32">
    <!-- TopAppBar -->

    <main class="pt-10 px-6 max-w-md mx-auto">
        <!-- Hero Header Section -->
        <section class="mb-10">
            <h1 class="text-3xl font-extrabold text-on-surface tracking-tight mb-2">Add Medical Report</h1>
            <p class="text-on-surface-variant text-sm font-medium">Expand your medical history</p>
        </section>
        <!-- Form Container: Bento-ish Layout -->
        <div class="space-y-6">
            <!-- Category Selection -->
            <div class="bg-surface-container-lowest p-6 rounded-lg shadow-sm pt-10s0">
                <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-4">Supported
                    Category</label>
                <div class="flex flex-wrap gap-2">
                    <button
                        class="px-4 py-2 rounded-full bg-primary text-on-primary text-xs font-semibold active:scale-95 transition-transform">Blood
                        Sugar</button>
                    <button
                        class="px-4 py-2 rounded-full bg-primary text-on-primary text-xs font-semibold active:scale-95 transition-transform">Blood
                        Pressure</button>
                </div>
            </div>
            <!-- Upload Zone -->
            <div
                class="bg-surface-container p-6 rounded-lg border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center text-center">
                <div class="w-16 h-16 bg-primary-container/10 rounded-full flex items-center justify-center mb-4">
                    <span class="material-symbols-outlined text-primary text-3xl">upload_file</span>
                </div>
                <h3 class="text-on-surface font-bold mb-1">Upload Report</h3>
                <p class="text-on-surface-variant text-xs mb-6 px-4">Drag and drop your PDF or medical document here</p>
                <button
                    class="w-full h-12 bg-white text-primary border border-primary/20 rounded-full font-bold text-sm shadow-sm active:scale-95 transition-transform flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">attachment</span>
                    Select File
                </button>
            </div>
            <!-- Attachment Option -->
            <div class="bg-surface-container-lowest p-5 rounded-lg flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-secondary-container/20 rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-secondary text-xl">photo_camera</span>
                    </div>
                    <div>
                        <h4 class="text-sm font-bold text-on-surface leading-tight">Attach Prescription Image</h4>
                        <p class="text-[10px] text-on-surface-variant font-medium">(Optional)</p>
                    </div>
                </div>
                <button
                    class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center active:scale-90 transition-transform">
                    <span class="material-symbols-outlined text-on-surface-variant text-lg">add</span>
                </button>
            </div>
            <!-- Metadata Inputs (High-Density) -->
            <!-- Primary Action -->
            <div class="pt-4">
                <button
                    class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-xl font-bold text-lg shadow-[0_10px_25px_-5px_rgba(0,85,201,0.4)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
                    Extract Data Now
                </button>
                <p class="text-center text-[10px] text-on-surface-variant mt-4 px-8 leading-relaxed">
                    Our AI will securely parse your document to update your health dashboard automatically.
                </p>
            </div>
        </div>
    </main>
    <!-- BottomNavBar -->

</body>

</html>
